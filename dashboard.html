<!DOCTYPE html><html lang='ne'><head><meta charset='UTF-8'><title>ड्यासबोर्ड</title><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:8px;text-align:left}th{background:#1a365d;color:#fff}</style></head><body><h2>गण नं. २ महाराजगंज - कमाण्डर ड्यासबोर्ड</h2><table><thead><tr><th>मिति/समय</th><th>सिफ्ट</th><th>दर्जा र नाम</th><th>स्थान</th><th>ड्युटी प्रकार</th><th>कार्य विवरण</th><th>कैफियत</th></tr></thead><tbody>{% for r in records %}<tr><td>{{r.date_logged}}</td><td>{{r.shift}}</td><td>{{r.rank_name}}</td><td>{{r.location}}</td><td>{{r.duty_type}}</td><td>{{r.achievements}}</td><td>{{r.remarks}}</td></tr>{% endfor %}</tbody></table></body></html>
